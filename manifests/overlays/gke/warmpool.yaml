# SandboxWarmPool — keeps N pre-warmed sandbox pods ready so SandboxClaims
# resolve in seconds instead of waiting for node provisioning + image
# pull + readiness probe. Required on GKE Autopilot with the agent-
# sandbox addon: the addon's controller appears to expect a warmpool
# to back claims rather than spinning up sandboxes on demand. Without
# one, claims sit at Ready=False indefinitely.
#
# Two replicas so the smoketest can run both test files back-to-back
# without waiting for replenishment between them. Tune up if you'll
# have higher concurrent-session counts.
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxWarmPool
metadata:
  name: kode-gopher-warmpool
spec:
  replicas: 2
  sandboxTemplateRef:
    name: go-runtime-template
  updateStrategy:
    type: OnReplenish
