# SandboxTemplate that the kode-gopher CLI / MCP server creates pods from.
# Same name as upstream's (`go-runtime-template`) so the kode-gopher binary
# doesn't need to know which template is in use — but points at our
# locally-built image with the prewarmed GCP cache.
#
# Slice 0.5: no runtimeClassName (kind has no sandbox runtime).
# Slice 3: gVisor overlay + Workload Identity binding land in
# manifests/overlays/gke/.
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: go-runtime-template
  namespace: default
spec:
  # Controller-managed headless Service per sandbox — the sandbox-router
  # resolves this via DNS. Without it, uploads/runs return 502.
  service: true
  podTemplate:
    metadata:
      labels:
        sandbox: kode-gopher-sandbox
    spec:
      containers:
        - name: go-runtime
          image: kode-gopher-sandbox:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          readinessProbe:
            httpGet:
              path: /
              port: 8888
            periodSeconds: 2
            failureThreshold: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
